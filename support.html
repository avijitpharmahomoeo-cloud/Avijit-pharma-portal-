<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexigigs Support Box</title>
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Load FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-sm rounded-3xl shadow-xl overflow-hidden border border-slate-100 transform transition-all hover:shadow-2xl">
        
        <div class="bg-gradient-to-br from-indigo-600 to-blue-700 p-8 text-center relative">
            <!-- Decorative background circles -->
            <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-white opacity-10 rounded-full blur-xl"></div>
            <div class="absolute bottom-0 left-0 -mb-4 -ml-4 w-20 h-20 bg-white opacity-10 rounded-full blur-lg"></div>
            
            <div class="relative z-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white/20 rounded-full mb-4 backdrop-blur-sm border border-white/30 shadow-inner">
                    <i class="fa-solid fa-headset text-3xl text-white"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2 tracking-tight">Support</h2>
                <p class="text-blue-100 text-sm font-medium">Flexigigs Help Center</p>
            </div>
        </div>

        <div class="p-6 text-left bg-white">
            <p class="text-slate-600 mb-6 text-center leading-relaxed text-sm">
                Need help with your account or gigs? Fill out the details below to message us directly on WhatsApp.
            </p>
            
            <form id="whatsappForm" class="space-y-4">
                <!-- Name Input -->
                <div>
                    <label for="userName" class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Your Name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="fa-regular fa-user text-slate-400"></i>
                        </div>
                        <input type="text" id="userName" required
                               class="block w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all sm:text-sm text-slate-800"
                               placeholder="e.g. John Doe">
                    </div>
                </div>

                <!-- Query Input -->
                <div>
                    <label for="userQuery" class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Your Query</label>
                    <div class="relative">
                        <textarea id="userQuery" rows="3" required
                                  class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all sm:text-sm text-slate-800 resize-none"
                                  placeholder="Describe how we can help you..."></textarea>
                    </div>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" 
                   class="group mt-2 relative flex items-center justify-center w-full bg-[#25D366] hover:bg-[#1EBE5D] text-white font-semibold py-3.5 px-6 rounded-xl transition-all duration-300 shadow-[0_4px_14px_0_rgba(37,211,102,0.39)] hover:shadow-[0_6px_20px_rgba(37,211,102,0.23)] hover:-translate-y-0.5 overflow-hidden">
                    
                    <!-- Button shine effect -->
                    <div class="absolute inset-0 flex h-full w-full justify-center [transform:skew(-12deg)_translateX(-100%)] group-hover:duration-1000 group-hover:[transform:skew(-12deg)_translateX(100%)]">
                        <div class="relative h-full w-8 bg-white/20"></div>
                    </div>
                    
                    <i class="fa-brands fa-whatsapp text-2xl mr-2.5"></i>
                    <span>Send to WhatsApp</span>
                </button>
            </form>
            
            <div class="mt-6 flex items-center justify-center gap-2 text-xs font-medium text-slate-500">
                <span class="relative flex h-2.5 w-2.5">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                </span>
                We typically reply in a few minutes
            </div>
        </div>

    </div>

    <script>
        document.getElementById('whatsappForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page reload
            
            // Get values from inputs
            const name = document.getElementById('userName').value.trim();
            const query = document.getElementById('userQuery').value.trim();
            
            // The official Flexigigs WhatsApp Number
            const phoneNumber = "917450985883";
            
            // Format the message with line breaks and bold text (using WhatsApp *bold* syntax)
            const rawMessage = `*Support Request from Flexigigs*\n\n*Name:* ${name}\n*Query:* ${query}`;
            
            // Encode the message to be URL-safe
            const encodedMessage = encodeURIComponent(rawMessage);
            
            // Construct the final wa.me URL
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;
            
            // Open WhatsApp in a new tab
            window.open(whatsappUrl, '_blank');
        });
    </script>
</body>
</html>
